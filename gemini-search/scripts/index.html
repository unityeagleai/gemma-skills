<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gemini Search</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e0e0e8;
      min-height: 100vh;
      padding: 20px 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .logo span { color: #00d4ff; }
    .powered {
      font-size: 11px;
      color: #444;
      margin-top: 2px;
    }
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    input[type="text"] {
      flex: 1;
      background: #13131f;
      border: 1px solid #252535;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      color: #e0e0e8;
      outline: none;
    }
    input[type="text"]:focus { border-color: #00d4ff; }
    input[type="text"]::placeholder { color: #444; }
    button {
      background: #00d4ff;
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    button:active { opacity: 0.8; }
    #status {
      font-size: 13px;
      color: #555;
      margin-bottom: 12px;
      min-height: 18px;
    }
    .answer-card {
      background: #13131f;
      border: 1px solid #1e1e30;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
    }
    .answer-label {
      font-size: 11px;
      font-weight: 600;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .answer-text {
      font-size: 14px;
      color: #ccc;
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .sources-card {
      background: #13131f;
      border: 1px solid #1e1e30;
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 14px;
    }
    .sources-label {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }
    .source-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #1e1e30;
    }
    .source-item:last-child { border-bottom: none; }
    .source-num {
      font-size: 11px;
      color: #00d4ff;
      font-weight: 700;
      min-width: 18px;
      margin-top: 1px;
    }
    .source-info { flex: 1; }
    .source-title {
      font-size: 13px;
      color: #e0e0e8;
      font-weight: 500;
      margin-bottom: 2px;
      line-height: 1.35;
    }
    .source-url {
      font-size: 11px;
      color: #444;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 260px;
    }
    .source-link {
      text-decoration: none;
      display: block;
    }
    .source-link:hover .source-title { color: #00d4ff; }
    .queries-row {
      font-size: 12px;
      color: #444;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    .queries-row span {
      background: #1a1a2a;
      border-radius: 6px;
      padding: 2px 8px;
      margin-right: 6px;
      display: inline-block;
      margin-bottom: 4px;
    }
    .error {
      background: #1a0f12;
      border: 1px solid #3d1f26;
      border-radius: 10px;
      padding: 14px;
      color: #e05a70;
      font-size: 14px;
    }
    .no-key {
      background: #0f1a1f;
      border: 1px solid #1a3040;
      border-radius: 10px;
      padding: 16px;
      color: #00d4ff;
      font-size: 13px;
      line-height: 1.6;
    }
    .no-key strong { color: #fff; display: block; margin-bottom: 6px; }
    .no-key code {
      background: #1a2a35;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">Gemini <span>Search</span></div>
    <div class="powered">powered by Google</div>
  </div>
</div>

<div class="search-row">
  <input type="text" id="query" placeholder="Search anything..." autocomplete="off">
  <button id="btn" onclick="doSearch()">Search</button>
</div>

<div id="status"></div>
<div id="output"></div>

<script>
  var params   = new URLSearchParams(window.location.search);
  var API_KEY  = params.get('GEMINI_API_KEY') || params.get('gemini_api_key') || '';
  var API_URL  = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent';

  var queryEl  = document.getElementById('query');
  var statusEl = document.getElementById('status');
  var outputEl = document.getElementById('output');

  if (!API_KEY) {
    outputEl.innerHTML = '<div class="no-key"><strong>API key required</strong>'
      + 'Add your Gemini API key in Gallery \u2192 Settings \u2192 Secrets \u2192 <code>GEMINI_API_KEY</code>.<br><br>'
      + 'Get a free key at <strong>aistudio.google.com/apikey</strong></div>';
  }

  queryEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSearch();
  });

  var urlQuery = params.get('query') || params.get('prompt') || params.get('q');
  if (urlQuery && API_KEY) {
    queryEl.value = urlQuery;
    doSearch();
  }

  function setStatus(msg) { statusEl.textContent = msg; }

  async function doSearch() {
    var q = queryEl.value.trim();
    if (!q) return;
    if (!API_KEY) return;

    outputEl.innerHTML = '';
    setStatus('Searching the web...');
    document.getElementById('btn').disabled = true;

    try {
      var res = await fetch(API_URL + '?key=' + encodeURIComponent(API_KEY), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ role: 'user', parts: [{ text: q }] }],
          tools: [{ google_search: {} }]
        })
      });

      var data = await res.json();

      if (!res.ok) {
        var errMsg = (data.error && data.error.message) ? data.error.message : 'API error ' + res.status;
        showError(errMsg);
        setStatus('');
        return;
      }

      var candidate = data.candidates && data.candidates[0];
      if (!candidate) { showError('No response from Gemini.'); setStatus(''); return; }

      var answerText = candidate.content && candidate.content.parts
        ? candidate.content.parts.map(function(p) { return p.text || ''; }).join('')
        : '';

      var grounding = candidate.groundingMetadata || {};
      var chunks    = grounding.groundingChunks || [];
      var queries   = grounding.webSearchQueries || [];

      renderResults(answerText, chunks, queries);
      returnToGemma(answerText, chunks);
      setStatus('');

    } catch(e) {
      showError('Network error. Check your connection and try again.');
      setStatus('');
    }

    document.getElementById('btn').disabled = false;
  }

  function renderResults(text, chunks, queries) {
    var html = '';

    if (queries.length > 0) {
      html += '<div class="queries-row">';
      queries.forEach(function(q) { html += '<span>' + escHtml(q) + '</span>'; });
      html += '</div>';
    }

    html += '<div class="answer-card">'
      + '<div class="answer-label">Answer</div>'
      + '<div class="answer-text">' + escHtml(text) + '</div>'
      + '</div>';

    if (chunks.length > 0) {
      html += '<div class="sources-card"><div class="sources-label">Sources</div>';
      chunks.forEach(function(chunk, i) {
        var web = chunk.web || {};
        var title = web.title || web.uri || 'Source ' + (i + 1);
        var uri   = web.uri || '#';
        var domain = '';
        try { domain = new URL(uri).hostname.replace('www.', ''); } catch(e) {}

        html += '<a class="source-link" href="' + escHtml(uri) + '" target="_blank">'
          + '<div class="source-item">'
          + '<div class="source-num">[' + (i + 1) + ']</div>'
          + '<div class="source-info">'
          + '<div class="source-title">' + escHtml(title) + '</div>'
          + '<div class="source-url">' + escHtml(domain) + '</div>'
          + '</div>'
          + '</div></a>';
      });
      html += '</div>';
    }

    outputEl.innerHTML = html;
  }

  function returnToGemma(text, chunks) {
    var result = text;
    if (chunks.length > 0) {
      result += '\n\nSources:\n';
      chunks.forEach(function(chunk, i) {
        var web = chunk.web || {};
        result += '[' + (i + 1) + '] ' + (web.title || '') + ' \u2014 ' + (web.uri || '') + '\n';
      });
    }
    if (typeof ai_edge_gallery_get_result === 'function') {
      ai_edge_gallery_get_result(result);
    }
  }

  function showError(msg) {
    outputEl.innerHTML = '<div class="error">' + escHtml(msg) + '</div>';
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
